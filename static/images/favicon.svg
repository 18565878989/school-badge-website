           L26 16 
           Q26 24 16 28 
           Q6 24 6 16 
           L6 8.5 
           Z" fill="none" stroke="url(#goldGrad)" stroke-width="0.5"/>
  
  <!-- S字母 -->
  <path d="M10 10 
