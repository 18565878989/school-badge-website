<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑校徽图片 - {{ school.name_cn or school.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    {% extends "admin/base.html" %}
    
    {% block content %}
    <main class="admin-content">
        <div class="content-header">
            <h1>编辑校徽图片</h1>
            <a href="{{ url_for('admin_badge_images') }}" class="btn">← 返回列表</a>
        </div>
        
        <div class="info-card">
            <h2>{{ school.name_cn or school.name }}</h2>
            <p class="subtitle">{{ school.name }}</p>
        </div>
        
        <div class="section-card">
            <h3>当前校徽</h3>
            {% if school.badge_url %}
            <div class="badge-preview">
                <img src="{{ school.badge_url }}" alt="校徽"
                     onerror="this.src='{{ url_for('static', filename='images/badge-placeholder.svg') }}'">
            </div>
            {% else %}
            <p class="text-muted">暂无校徽</p>
            {% endif %}
        </div>
        
        <div class="section-card">
            <h3>修改校徽URL</h3>
            <form method="post">
                <div class="form-group">
                    <label>校徽图片URL</label>
                    <input type="text" name="badge_url" value="{{ school.badge_url or '' }}"
                           placeholder="/static/images/badges/school_123.png 或 https://...">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="{{ url_for('admin_badge_images') }}" class="btn">取消</a>
                </div>
            </form>
        </div>
    </main>
    
    <style>
    .info-card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
    .info-card h2 { font-size: 1.5rem; margin-bottom: 4px; }
    .info-card .subtitle { color: var(--text-secondary); }
    .section-card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
    .section-card h3 { font-size: 1.1rem; margin-bottom: 16px; }
    .badge-preview { width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
    .badge-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: monospace; }
    .form-actions { display: flex; gap: 12px; }
    .text-muted { color: var(--text-secondary); }
    </style>
    {% endblock %}
</html>
