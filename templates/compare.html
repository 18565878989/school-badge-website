{% extends "base_apple.html" %}

{% block title %}学校对比 - 校徽网{% endblock %}

{% block content %}
<div style="max-width: 1400px; margin: 0 auto; padding: 32px 40px 60px; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;">
    
    <!-- Header -->
    <div style="margin-bottom: 32px;">
        <h1 style="font-size: 2rem; font-weight: 700; color: #1d1d1f; margin: 0 0 8px 0;">⚖️ 学校对比</h1>
        <p style="font-size: 1rem; color: #86868b; margin: 0;">选择两所学校进行全方位对比分析</p>
    </div>
    
    <!-- School Selector -->
    <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px; margin-bottom: 40px; align-items: center;">
        
        <!-- School 1 Selector -->
        <div style="background: white; border-radius: 24px; padding: 24px; box-shadow: 0 2px 16px rgba(0,0,0,0.06);">
            <label style="font-size: 0.85rem; font-weight: 600; color: #86868b; margin-bottom: 12px; display: block;">选择第一所学校</label>
            <select id="school1-select" onchange="loadSchool(1)" style="width: 100%; padding: 14px 16px; border-radius: 14px; border: 2px solid #e5e5e7; font-size: 1rem; background: white; cursor: pointer;">
                <option value="">-- 请选择学校 --</option>
                {% for school in hk_schools %}
                <option value="{{ school.id }}">{{ school.name }} ({{ school.district }})</option>
                {% endfor %}
            </select>
        </div>
        
        <!-- VS Badge -->
        <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #1E3A5F, #0D2137); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(30,58,95,0.3);">
            <span style="color: white; font-size: 1.5rem; font-weight: 700;">VS</span>
        </div>
        
        <!-- School 2 Selector -->
        <div style="background: white; border-radius: 24px; padding: 24px; box-shadow: 0 2px 16px rgba(0,0,0,0.06);">
            <label style="font-size: 0.85rem; font-weight: 600; color: #86868b; margin-bottom: 12px; display: block;">选择第二所学校</label>
            <select id="school2-select" onchange="loadSchool(2)" style="width: 100%; padding: 14px 16px; border-radius: 14px; border: 2px solid #e5e5e7; font-size: 1rem; background: white; cursor: pointer;">
                <option value="">-- 请选择学校 --</option>
                {% for school in hk_schools %}
                <option value="{{ school.id }}">{{ school.name }} ({{ school.district }})</option>
                {% endfor %}
            </select>
        </div>
    </div>
    
    <!-- Comparison Results -->
    <div id="comparison-result" style="display: none;">
        
        <!-- Basic Info Comparison -->
        <div style="background: white; border-radius: 24px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom: 24px;">
            <h2 style="font-size: 1.3rem; font-weight: 600; color: #1d1d1f; margin: 0 0 24px 0; display: flex; align-items: center; gap: 8px;">
                <span>📋</span> 基本信息对比
            </h2>
            
            <div style="display: grid; grid-template-columns: 1fr 120px 1fr; gap: 20px;">
                <!-- School 1 Info -->
                <div id="school1-info" style="text-align: center;">
                    <!-- 动态填充 -->
                </div>
                
                <!-- Field Labels -->
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.85rem; color: #86868b;">校名</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.85rem; color: #86868b;">地区</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.85rem; color: #86868b;">性别</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.85rem; color: #86868b;">办学类型</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.85rem; color: #86868b;">校监</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.85rem; color: #86868b;">校长</div>
                </div>
                
                <!-- School 2 Info -->
                <div id="school2-info" style="text-align: center;">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>
        
        <!-- Stats Comparison (if available) -->
        <div id="stats-comparison" style="background: white; border-radius: 24px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom: 24px;">
            <h2 style="font-size: 1.3rem; font-weight: 600; color: #1d1d1f; margin: 0 0 24px 0; display: flex; align-items: center; gap: 8px;">
                <span>📊</span> 历年数据对比
            </h2>
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;" id="stats-cards">
                <!-- 动态填充 -->
            </div>
        </div>
        
        <!-- Summary -->
        <div style="background: linear-gradient(135deg, #1E3A5F 0%, #0D2137 100%); border-radius: 24px; padding: 32px; color: white;">
            <h2 style="font-size: 1.3rem; font-weight: 600; margin: 0 0 20px 0; display: flex; align-items: center; gap: 8px;">
                <span>✨</span> 对比总结
            </h2>
            <div id="summary-content" style="font-size: 1rem; line-height: 1.8;">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>
    
</div>

<script>
const school1Data = {{ school1 | tojson }};
const school2Data = {{ school2 | tojson }};

// Load initial data if schools are pre-selected
if (school1Data) {
    document.getElementById('school1-select').value = school1Data.id;
    loadSchool(1);
}
if (school2Data) {
    document.getElementById('school2-select').value = school2Data.id;
    loadSchool(2);
}

async function loadSchool(num) {
    const select = document.getElementById(`school${num}-select`);
    const schoolId = select.value;
    
    if (!schoolId) return;
    
    const otherNum = num === 1 ? 2 : 1;
    const otherSelect = document.getElementById(`school${otherNum}-select`);
    
    // Prevent selecting same school
    if (otherSelect.value === schoolId) {
        alert('不能选择相同的学校！');
        select.value = '';
        return;
    }
    
    // Load comparison
    if (otherSelect.value) {
        await compareSchools(otherSelect.value, schoolId);
    }
}

async function compareSchools(id1, id2) {
    const resultDiv = document.getElementById('comparison-result');
    resultDiv.style.display = 'block';
    
    resultDiv.innerHTML = '<div style="text-align: center; padding: 40px;"><div style="display: inline-block; width: 40px; height: 40px; border: 3px solid #e5e5e7; border-top-color: #007AFF; border-radius: 50%; animation: spin 1s linear infinite;"></div><p style="margin-top: 16px; color: #86868b;">加载中...</p></div><style>@keyframes spin { to { transform: rotate(360deg); } }</style>';
    
    try {
        const response = await fetch(`/api/compare/${id1}/${id2}`);
        const data = await response.json();
        
        renderComparison(data);
    } catch (error) {
        resultDiv.innerHTML = '<div style="text-align: center; padding: 40px; color: #FF3B30;">加载失败，请重试</div>';
    }
}

function renderComparison(data) {
    const { school1, school2, stats1, stats2 } = data;
    
    const resultDiv = document.getElementById('comparison-result');
    
    // Latest stats
    const s1Latest = stats1 && stats1[0] ? stats1[0] : {};
    const s2Latest = stats2 && stats2[0] ? stats2[0] : {};
    
    resultDiv.innerHTML = `
        <!-- Basic Info -->
        <div style="background: white; border-radius: 24px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom: 24px;">
            <h2 style="font-size: 1.3rem; font-weight: 600; color: #1d1d1f; margin: 0 0 24px 0;">📋 基本信息对比</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 140px 1fr; gap: 20px;">
                <!-- School 1 -->
                <div style="text-align: center;">
                    <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #007AFF, #5856D6); border-radius: 20px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                        ${school1.badge_url ? `<img src="${school1.badge_url}" style="width: 60px; height: 60px; object-fit: contain;">` : '🎓'}
                    </div>
                    <h3 style="font-size: 1.1rem; font-weight: 600; color: #1d1d1f; margin: 0 0 8px 0;">${school1.name}</h3>
                    <p style="font-size: 0.85rem; color: #86868b; margin: 0;">${school1.name_cn || ''}</p>
                </div>
                
                <!-- Labels -->
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.8rem; color: #86868b;">校名</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.8rem; color: #86868b;">地区</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.8rem; color: #86868b;">性别</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.8rem; color: #86868b;">办学类型</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.8rem; color: #86868b;">校长</div>
                    <div style="padding: 12px; background: #f5f5f7; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.8rem; color: #86868b;">电话</div>
                </div>
                
                <!-- School 2 -->
                <div style="text-align: center;">
                    <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #34C759, #30D158); border-radius: 20px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                        ${school2.badge_url ? `<img src="${school2.badge_url}" style="width: 60px; height: 60px; object-fit: contain;">` : '🎓'}
                    </div>
                    <h3 style="font-size: 1.1rem; font-weight: 600; color: #1d1d1f; margin: 0 0 8px 0;">${school2.name}</h3>
                    <p style="font-size: 0.85rem; color: #86868b; margin: 0;">${school2.name_cn || ''}</p>
                </div>
            </div>
            
            <!-- Data Rows -->
            <div style="display: grid; grid-template-columns: 1fr 140px 1fr; gap: 20px; margin-top: 20px;">
                <div style="text-align: center;">
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school1.district || '-'}</p>
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school1.gender || '-'}</p>
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school1.finance_type || '-'}</p>
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school1.principal || '-'}</p>
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school1.phone || '-'}</p>
                </div>
                <div></div>
                <div style="text-align: center;">
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school2.district || '-'}</p>
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school2.gender || '-'}</p>
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school2.finance_type || '-'}</p>
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school2.principal || '-'}</p>
                    <p style="font-size: 0.95rem; color: #1d1d1f; font-weight: 500;">${school2.phone || '-'}</p>
                </div>
            </div>
        </div>
        
        ${(stats1.length > 0 || stats2.length > 0) ? `
        <!-- Stats Comparison -->
        <div style="background: white; border-radius: 24px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom: 24px;">
            <h2 style="font-size: 1.3rem; font-weight: 600; color: #1d1d1f; margin: 0 0 24px 0;">📊 历年数据对比</h2>
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div style="background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%); color: white; padding: 24px; border-radius: 20px; text-align: center;">
                    <div style="font-size: 2.5rem; font-weight: 700;">${s1Latest.student_count || '-'}</div>
                    <div style="font-size: 0.85rem; opacity: 0.8; margin-top: 8px;">${school1.name.substring(0, 15)}... 学生</div>
                </div>
                <div style="background: linear-gradient(135deg, #FF9500 0%, #FF6B00 100%); color: white; padding: 24px; border-radius: 20px; text-align: center;">
                    <div style="font-size: 2.5rem; font-weight: 700;">${s1Latest.teacher_count || '-'} vs ${s2Latest.teacher_count || '-'}</div>
                    <div style="font-size: 0.85rem; opacity: 0.8; margin-top: 8px;">教师人数对比</div>
                </div>
                <div style="background: linear-gradient(135deg, #34C759 0%, #30D158 100%); color: white; padding: 24px; border-radius: 20px; text-align: center;">
                    <div style="font-size: 2.5rem; font-weight: 700;">${s2Latest.student_count || '-'}</div>
                    <div style="font-size: 0.85rem; opacity: 0.8; margin-top: 8px;">${school2.name.substring(0, 15)}... 学生</div>
                </div>
            </div>
            
            ${(stats1.length > 0 && stats2.length > 0) ? `
            <div style="margin-top: 24px;">
                <p style="font-size: 0.85rem; font-weight: 600; color: #86868b; margin-bottom: 12px;">📈 趋势对比</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <p style="font-size: 0.85rem; color: #007AFF; font-weight: 600; margin-bottom: 8px;">${school1.name.substring(0, 20)}</p>
                        ${stats1.slice(0, 3).map(s => `<div style="display: flex; justify-content: space-between; padding: 8px 12px; background: #f5f5f7; border-radius: 8px; margin-bottom: 4px; font-size: 0.85rem;"><span>${s.year}</span><span>学生 ${s.student_count}</span><span>教师 ${s.teacher_count}</span></div>`).join('')}
                    </div>
                    <div>
                        <p style="font-size: 0.85rem; color: #34C759; font-weight: 600; margin-bottom: 8px;">${school2.name.substring(0, 20)}</p>
                        ${stats2.slice(0, 3).map(s => `<div style="display: flex; justify-content: space-between; padding: 8px 12px; background: #f5f5f7; border-radius: 8px; margin-bottom: 4px; font-size: 0.85rem;"><span>${s.year}</span><span>学生 ${s.student_count}</span><span>教师 ${s.teacher_count}</span></div>`).join('')}
                    </div>
                </div>
            </div>
            ` : ''}
        </div>
        ` : ''}
        
        <!-- Summary -->
        <div style="background: linear-gradient(135deg, #1E3A5F 0%, #0D2137 100%); border-radius: 24px; padding: 32px; color: white;">
            <h2 style="font-size: 1.3rem; font-weight: 600; margin: 0 0 20px 0;">✨ 对比总结</h2>
            <div style="font-size: 1rem; line-height: 1.8;">
                <p>📍 <strong>地区分布：</strong>${school1.district || '-'} vs ${school2.district || '-'}</p>
                <p>🎓 <strong>办学类型：</strong>${school1.finance_type || '-'} vs ${school2.finance_type || '-'}</p>
                <p>👥 <strong>性别限制：</strong>${school1.gender || '-'} vs ${school2.gender || '-'}</p>
                <p>📊 <strong>规模对比：</strong>${school1.name} 有 ${s1Latest.student_count || '?'} 名学生，${school2.name} 有 ${s2Latest.student_count || '?'} 名学生</p>
                ${s1Latest.student_count && s2Latest.student_count ? `
                <p>🏆 <strong>结论：</strong>${school1.name} 的学生规模为 ${school2.name} 的 ${((s1Latest.student_count / s2Latest.student_count) * 100).toFixed(0)}%</p>
                ` : ''}
            </div>
        </div>
    `;
}
</script>

<style>
select:focus {
    border-color: #007AFF;
    outline: none;
}
</style>

{% endblock %}
