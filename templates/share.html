<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享 - 校徽网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .share-container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .share-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .share-header h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .share-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .share-preview {
            background: #f8f9fa;
            padding: 16px;
            margin: 16px;
            border-radius: 12px;
            display: flex;
            gap: 12px;
        }
        
        .share-preview-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .share-preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .share-preview-image .badge-icon {
            font-size: 40px;
        }
        
        .share-preview-content {
            flex: 1;
            min-width: 0;
        }
        
        .share-preview-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .share-preview-desc {
            font-size: 12px;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .share-preview-source {
            font-size: 11px;
            color: #999;
            margin-top: 6px;
        }
        
        .share-platforms {
            padding: 0 16px;
        }
        
        .share-platforms-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .platform-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 12px 8px;
            border-radius: 12px;
            transition: all 0.2s;
            border: none;
            background: transparent;
        }
        
        .platform-item:hover {
            background: #f0f0f5;
            transform: translateY(-2px);
        }
        
        .platform-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 6px;
        }
        
        .platform-name {
            font-size: 11px;
            color: #333;
        }
        
        /* Platform colors */
        .wechat { background: #07c160; color: white; }
        .weibo { background: #e6162d; color: white; }
        .douyin { background: #000; color: white; }
        .xiaohongshu { background: #fe2c55; color: white; }
        .twitter { background: #1da1f2; color: white; }
        .facebook { background: #1877f2; color: white; }
        .whatsapp { background: #25d366; color: white; }
        .linkedin { background: #0a66c2; color: white; }
        .line { background: #06c755; color: white; }
        .copy { background: #666; color: white; }
        .more { background: #999; color: white; }
        
        .share-link-section {
            padding: 0 16px 20px;
        }
        
        .share-link-box {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
        }
        
        .share-link-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 12px;
            font-size: 13px;
            color: #333;
            outline: none;
        }
        
        .share-copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        
        .share-copy-btn:hover {
            background: #5568d3;
        }
        
        .share-copy-btn.copied {
            background: #07c160;
        }
        
        .share-qr-section {
            padding: 0 16px 20px;
            text-align: center;
        }
        
        .share-qr-btn {
            background: transparent;
            border: 2px dashed #ddd;
            color: #666;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .share-qr-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .share-qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .share-qr-modal.active {
            display: flex;
        }
        
        .share-qr-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
        }
        
        .share-qr-content h3 {
            margin-bottom: 16px;
            color: #333;
        }
        
        .share-qr-code {
            width: 200px;
            height: 200px;
            background: #f5f5f5;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .share-qr-code img {
            max-width: 100%;
            max-height: 100%;
        }
        
        .share-qr-close {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="share-container">
        <div class="share-header">
            <h2>分享到社交平台</h2>
            <p>分享校徽网精彩内容</p>
        </div>
        
        <div class="share-preview">
            <div class="share-preview-image">
                <span class="badge-icon">🎓</span>
            </div>
            <div class="share-preview-content">
                <div class="share-preview-title" id="shareTitle">加载中...</div>
                <div class="share-preview-desc" id="shareDesc">请稍候...</div>
                <div class="share-preview-source" id="shareSource">来自 校徽网</div>
            </div>
        </div>
        
        <div class="share-platforms">
            <div class="share-platforms-title">分享到</div>
            <div class="platform-grid">
                <button class="platform-item" onclick="shareTo('wechat')">
                    <div class="platform-icon wechat">💬</div>
                    <span class="platform-name">微信</span>
                </button>
                <button class="platform-item" onclick="shareTo('weibo')">
                    <div class="platform-icon weibo">📱</div>
                    <span class="platform-name">微博</span>
                </button>
                <button class="platform-item" onclick="shareTo('douyin')">
                    <div class="platform-icon douyin">📱</div>
                    <span class="platform-name">抖音</span>
                </button>
                <button class="platform-item" onclick="shareTo('xiaohongshu')">
                    <div class="platform-icon xiaohongshu">📕</div>
                    <span class="platform-name">小红书</span>
                </button>
                <button class="platform-item" onclick="shareTo('twitter')">
                    <div class="platform-icon twitter">🐦</div>
                    <span class="platform-name">X</span>
                </button>
                <button class="platform-item" onclick="shareTo('facebook')">
                    <div class="platform-icon facebook">📘</div>
                    <span class="platform-name">Facebook</span>
                </button>
                <button class="platform-item" onclick="shareTo('whatsapp')">
                    <div class="platform-icon whatsapp">💬</div>
                    <span class="platform-name">WhatsApp</span>
                </button>
                <button class="platform-item" onclick="shareTo('linkedin')">
                    <div class="platform-icon linkedin">💼</div>
                    <span class="platform-name">LinkedIn</span>
                </button>
            </div>
        </div>
        
        <div class="share-link-section">
            <div class="share-link-box">
                <input type="text" class="share-link-input" id="shareUrl" readonly>
                <button class="share-copy-btn" id="copyBtn" onclick="copyLink()">复制链接</button>
            </div>
        </div>
        
        <div class="share-qr-section">
            <button class="share-qr-btn" onclick="showQRCode()">
                📱 生成二维码分享
            </button>
        </div>
    </div>
    
    <!-- QR Code Modal -->
    <div class="share-qr-modal" id="qrModal">
        <div class="share-qr-content">
            <h3>扫码分享</h3>
            <div class="share-qr-code" id="qrCode">
                <span class="loading"></span>
            </div>
            <p style="color: #666; font-size: 13px; margin-bottom: 16px;">扫码二维码打开链接</p>
            <button class="share-qr-close" onclick="closeQRModal()">关闭</button>
        </div>
    </div>
    
    <script>
        // 从URL获取分享参数
        const urlParams = new URLSearchParams(window.location.search);
        const contentType = urlParams.get('type') || 'post';
        const contentId = urlParams.get('id') || '1';
        
        let shareData = {
            url: '',
            title: '',
            desc: '',
            image: ''
        };
        
        // 初始化分享信息
        async function initShare() {
            try {
                const response = await fetch(`/api/share/${contentType}/${contentId}`);
                const result = await response.json();
                
                if (result.success) {
                    shareData = result.data;
                    document.getElementById('shareTitle').textContent = shareData.title || '分享内容';
                    document.getElementById('shareDesc').textContent = shareData.desc || '';
                    document.getElementById('shareUrl').value = shareData.url;
                }
            } catch (e) {
                console.error('Failed to load share data:', e);
                document.getElementById('shareTitle').textContent = '分享精彩内容';
                document.getElementById('shareUrl').value = window.location.href;
            }
        }
        
        // 分享到各平台
        function shareTo(platform) {
            const url = encodeURIComponent(shareData.url);
            const title = encodeURIComponent(shareData.title);
            const desc = encodeURIComponent(shareData.desc);
            
            let shareUrl = '';
            
            switch(platform) {
                case 'wechat':
                    // 微信需要扫二维码，提示用户
                    showQRCode();
                    return;
                case 'weibo':
                    shareUrl = `https://service.weibo.com/share/share.php?url=${url}&title=${title}&pic=${encodeURIComponent(shareData.image || '')}`;
                    break;
                case 'douyin':
                    shareUrl = `https://www.douyin.com/share/${contentType}/${contentId}`;
                    break;
                case 'xiaohongshu':
                    shareUrl = `https://www.xiaohongshu.com/discovery/item/${contentId}`;
                    break;
                case 'twitter':
                    shareUrl = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
                    break;
                case 'facebook':
                    shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
                    break;
                case 'whatsapp':
                    shareUrl = `https://wa.me/?text=${title}%20${url}`;
                    break;
                case 'linkedin':
                    shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
                    break;
            }
            
            if (shareUrl) {
                window.open(shareUrl, '_blank', 'width=600,height=400');
                recordShare(platform);
            }
        }
        
        // 复制链接
        function copyLink() {
            const urlInput = document.getElementById('shareUrl');
            urlInput.select();
            urlInput.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(urlInput.value).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '已复制!';
                btn.classList.add('copied');
                recordShare('copy');
                
                setTimeout(() => {
                    btn.textContent = '复制链接';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
        
        // 显示二维码
        function showQRCode() {
            const modal = document.getElementById('qrModal');
            const qrContainer = document.getElementById('qrCode');
            
            // 使用第三方服务生成二维码
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(shareData.url)}`;
            qrContainer.innerHTML = `<img src="${qrUrl}" alt="二维码">`;
            
            modal.classList.add('active');
            recordShare('qr');
        }
        
        // 关闭二维码弹窗
        function closeQRModal() {
            document.getElementById('qrModal').classList.remove('active');
        }
        
        // 记录分享
        async function recordShare(platform) {
            try {
                await fetch('/api/share/record', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content_type: contentType,
                        content_id: contentId,
                        platform: platform,
                        share_url: shareData.url
                    })
                });
            } catch (e) {
                console.error('Failed to record share:', e);
            }
        }
        
        // 点击模态框外部关闭
        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeQRModal();
            }
        });
        
        // 初始化
        initShare();
    </script>
</body>
</html>
