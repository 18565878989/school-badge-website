<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员中心 - 校徽网</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .user-card { background: white; border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .user-avatar { width: 60px; height: 60px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .user-info { flex: 1; }
        .user-name { font-size: 18px; font-weight: 600; color: #333; }
        .user-level { font-size: 14px; color: #666; margin-top: 4px; }
        .user-level span { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 2px 10px; border-radius: 10px; font-size: 12px; }
        
        .current-plan { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .current-plan h2 { font-size: 16px; color: #333; margin-bottom: 15px; }
        .plan-badge { display: inline-block; background: linear-gradient(135deg, #ffd700, #ffb700); color: #333; padding: 8px 20px; border-radius: 20px; font-weight: 600; margin-bottom: 15px; }
        
        .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section h2 { font-size: 16px; color: #333; margin-bottom: 15px; }
        
        .level-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .level-card { border: 2px solid #eee; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .level-card:hover { border-color: #667eea; transform: translateY(-2px); }
        .level-card.active { border-color: #667eea; background: #f8f7ff; }
        .level-card.featured { border-color: #ffd700; position: relative; }
        .level-card.featured::before { content: '推荐'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #333; padding: 2px 12px; border-radius: 10px; font-size: 12px; }
        
        .level-name { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 10px; }
        .level-price { font-size: 24px; font-weight: 700; color: #667eea; }
        .level-price span { font-size: 14px; color: #999; font-weight: normal; }
        .level-features { text-align: left; margin-top: 15px; font-size: 13px; color: #666; }
        .level-features li { margin-bottom: 6px; list-style: none; }
        .level-features li::before { content: '✓'; color: #07c160; margin-right: 6px; }
        
        .benefits-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .benefit-item { text-align: center; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .benefit-icon { font-size: 28px; margin-bottom: 8px; }
        .benefit-name { font-size: 13px; color: #333; }
        
        .menu-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 15px; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .menu-item:hover { background: #e9ecef; }
        .menu-icon { font-size: 20px; }
        .menu-text { font-size: 14px; color: #333; }
        
        .tab-nav { display: flex; background: white; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .tab-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .tab-item.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        @media (max-width: 600px) {
            .level-grid { grid-template-columns: 1fr; }
            .benefits-list { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎓 会员中心</h1>
        <p>解锁更多特权，享受专属服务</p>
    </div>
    
    <div class="container">
        <!-- 用户信息 -->
        <div class="user-card">
            <div class="user-avatar">👤</div>
            <div class="user-info">
                <div class="user-name" id="userName">请登录</div>
                <div class="user-level" id="userLevel">开通会员享专属特权</div>
            </div>
        </div>
        
        <!-- 当前会员状态 -->
        <div class="current-plan" id="currentPlan" style="display: none;">
            <h2>当前会员</h2>
            <div class="plan-badge" id="currentLevelBadge">青铜会员</div>
            <p style="color: #666; font-size: 14px;">有效期至：<span id="expireDate">2026-12-31</span></p>
        </div>
        
        <!-- 会员等级 -->
        <div class="section">
            <h2>选择会员等级</h2>
            <div class="level-grid" id="levelGrid">
                <!-- 会员等级将通过JS加载 -->
            </div>
        </div>
        
        <!-- 会员权益 -->
        <div class="section">
            <h2>会员专属权益</h2>
            <div class="benefits-list">
                <div class="benefit-item">
                    <div class="benefit-icon">♾️</div>
                    <div class="benefit-name">无限分享</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon">🚫</div>
                    <div class="benefit-name">去广告</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon">🏆</div>
                    <div class="benefit-name">专属徽章</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon">📥</div>
                    <div class="benefit-name">高清下载</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon">🎁</div>
                    <div class="benefit-name">优先活动</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon">💬</div>
                    <div class="benefit-name">专属客服</div>
                </div>
            </div>
        </div>
        
        <!-- 订单记录 -->
        <div class="section">
            <h2>我的订单</h2>
            <div class="tab-nav">
                <div class="tab-item active" data-tab="membership">会员订单</div>
                <div class="tab-item" data-tab="shop">商城订单</div>
            </div>
            <div class="tab-content active" id="membershipOrders">
                <p style="color: #999; text-align: center; padding: 30px;">暂无订单</p>
            </div>
            <div class="tab-content" id="shopOrders">
                <p style="color: #999; text-align: center; padding: 30px;">暂无订单</p>
            </div>
        </div>
    </div>
    
    <script>
        // 加载会员等级
        async function loadLevels() {
            try {
                const response = await fetch('/api/membership/levels');
                const result = await response.json();
                
                if (result.success) {
                    const grid = document.getElementById('levelGrid');
                    grid.innerHTML = result.levels.map(level => `
                        <div class="level-card ${level.code === 'silver' ? 'featured' : ''}" onclick="selectLevel('${level.code}', ${level.price_monthly})">
                            <div class="level-name">${level.name_cn || level.name}</div>
                            <div class="level-price">¥${level.price_monthly}<span>/月</span></div>
                            <ul class="level-features">
                                <li>无限分享次数</li>
                                <li>去除广告</li>
                                ${level.code === 'bronze' ? '<li>基础徽章</li><li>高清下载</li>' : ''}
                                ${level.code === 'silver' ? '<li>高级徽章</li><li>头像挂件</li><li>优先展示</li>' : ''}
                                ${level.code === 'gold' ? '<li>定制校徽</li><li>线下活动优先</li><li>1对1咨询</li>' : ''}
                            </ul>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('Failed to load levels:', e);
            }
        }
        
        // 检查会员状态
        async function checkMembership() {
            try {
                const response = await fetch('/api/membership/status');
                const result = await response.json();
                
                if (result.is_member) {
                    document.getElementById('currentPlan').style.display = 'block';
                    document.getElementById('currentLevelBadge').textContent = result.level.level_name_cn;
                    document.getElementById('expireDate').textContent = result.level.expire_date;
                    document.getElementById('userLevel').innerHTML = `<span>${result.level.level_name_cn}</span>`;
                }
            } catch (e) {
                console.error('Failed to check membership:', e);
            }
        }
        
        // 选择会员等级
        async function selectLevel(levelCode, price) {
            if (!confirm(`确认开通 ${levelCode} 会员，月费 ¥${price}？`)) return;
            
            try {
                const response = await fetch('/api/membership/upgrade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: levelCode, duration: 'monthly' })
                });
                const result = await response.json();
                
                if (result.success) {
                    alert('订单已创建：' + result.order_no + '\n金额：¥' + result.amount + '\n\n支付功能开发中...');
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (e) {
                alert('请先登录');
            }
        }
        
        // Tab切换
        document.querySelectorAll('.tab-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.tab + 'Orders').classList.add('active');
            });
        });
        
        // 初始化
        loadLevels();
        checkMembership();
    </script>
</body>
</html>
